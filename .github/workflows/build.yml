name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Flutter ─────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'
          channel: stable
          cache: true

      # ── 4. Write local.properties (required by settings.gradle.kts) ────────
      - name: Create android/local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT"  >> android/local.properties

      # ── 5. Install NDK (needed by image_cropper) ───────────────────────────
      - name: Install Android NDK
        run: |
          NDK_VERSION=$(grep 'ndkVersion' android/app/build.gradle.kts \
            | grep -oP '[\d.]+' | head -1 || echo "27.0.12077973")
          echo "Installing NDK: $NDK_VERSION"
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;$NDK_VERSION" --sdk_root=$ANDROID_SDK_ROOT || true

      # ── 6. Dependencies ────────────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── 7. Analyze ─────────────────────────────────────────────────────────
      - name: Analyze
        run: flutter analyze --no-fatal-infos

      # ── 8. Build APK ───────────────────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release

      # ── 9. Rename APK ──────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}')
          DATE=$(date +'%Y%m%d-%H%M')
          APK_NAME="unzolo-v${VERSION}-${DATE}.apk"
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/${APK_NAME}
          echo "APK_NAME=${APK_NAME}" >> $GITHUB_ENV
          echo "APK_PATH=build/app/outputs/flutter-apk/${APK_NAME}" >> $GITHUB_ENV

      # ── 10. Upload artifact ────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      # ── 11. GitHub Release (main branch pushes only) ───────────────────────
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Unzolo Build #${{ github.run_number }}"
          body: |
            ## Unzolo APK — Build #${{ github.run_number }}

            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`

            ### Install on Android
            1. Download the `.apk` file below
            2. Settings → Security → enable **Install from unknown sources**
            3. Open the `.apk` → tap Install
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
