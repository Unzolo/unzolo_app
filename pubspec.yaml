name: unzolo
description: "Unzolo - Travel Social App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.0.0

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.5

  # Animations
  lottie: ^3.1.0
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.1.0

  # UI Components
  pinput: ^5.0.0
  intl_phone_field: ^3.2.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Image
  image_picker: ^1.1.2
  image_cropper: ^7.1.0

  # Utilities
  intl: ^0.19.0
  gap: ^3.0.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
